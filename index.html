<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS - ปอกใส่ปาก (ระบบจัดการหลังบ้าน)</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --primary: #E67E22;
            --primary-dark: #D35400;
            --bg: #F4F6F8;
            --white: #FFFFFF;
            --border: #E2E8F0;
            --text-main: #2C3E50;
            --text-muted: #7F8C8D;
            --success: #2ECC71;
            --success-dark: #27AE60;
            --danger: #E74C3C;
            --accent-blue: #3498DB;
            
            /* หมวดหมู่สีสำหรับจำแนกหัวข้อ */
            --cat-standard: #FFF3E0;
            --cat-standard-text: #E65100;
            --cat-premium: #F3E5F5;
            --cat-premium-text: #4A148C;
            --cat-dip: #E0F2F1;
            --cat-dip-text: #004D40;
        }
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 24px;
            color: var(--text-main);
        }
        .container {
            display: flex;
            gap: 24px;
            max-width: 1440px;
            margin: 0 auto;
        }
        /* Layout ด้านซ้ายและขวา */
        .menu-section { 
            flex: 1.8; 
            background: var(--white); 
            padding: 24px; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03); 
        }
        
        /* ตะกร้าสินค้าฝั่งขวา (Desktop) */
        .cart-section { 
            flex: 1.2; 
            background: var(--white); 
            padding: 24px; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03); 
            display: flex; 
            flex-direction: column; 
            position: sticky; 
            top: 24px; 
            max-height: calc(100vh - 48px); 
            overflow: hidden; 
        }
        
        h2 { 
            margin-top: 0; 
            font-size: 20px;
            font-weight: 600;
            color: var(--text-main); 
            border-bottom: 2px solid var(--border); 
            padding-bottom: 12px; 
            margin-bottom: 16px;
        }
        
        /* กล่องหุ้มเนื้อหาภายในตะกร้าที่เปิดให้สกรอลล์ได้ */
        .cart-body {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 16px;
            padding-right: 6px; 
        }
        
        /* กล่อง Auto Paste */
        .auto-paste-box { 
            background: #F0F4F8; 
            border: 1px solid #D1E2F2; 
            padding: 16px; 
            border-radius: 8px; 
            margin-bottom: 16px; 
        }
        .auto-paste-box textarea { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid #CBD5E1; 
            border-radius: 6px; 
            font-family: 'Sarabun'; 
            font-size: 13px; 
            resize: vertical; 
            box-sizing: border-box; 
            background: var(--white);
        }
        .btn-auto-parse { 
            background: var(--accent-blue); 
            color: white; 
            border: none; 
            padding: 10px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-family: 'Sarabun'; 
            font-weight: 600; 
            margin-top: 8px; 
            width: 100%; 
            font-size: 14px;
            transition: background 0.2s;
        }
        .btn-auto-parse:hover { background: #2980B9; }

        /* การตกแต่งหัวข้อหมวดหมู่แบบแบ่งสีชัดเจน */
        .category-title { 
            padding: 10px 14px; 
            border-radius: 6px; 
            margin: 24px 0 12px 0; 
            font-weight: 600; 
            font-size: 16px; 
        }
        .cat-style-standard { background: var(--cat-standard); color: var(--cat-standard-text); }
        .cat-style-premium { background: var(--cat-premium); color: var(--cat-premium-text); }
        .cat-style-dip { background: var(--cat-dip); color: var(--cat-dip-text); }
        
        /* รายการเมนูสินค้า */
        .menu-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 12px 8px; 
            border-bottom: 1px solid var(--border); 
            transition: background 0.2s; 
        }
        .menu-item:hover { background: #F8FAFC; }
        .menu-item.out-of-stock { opacity: 0.5; background: #F1F5F9; }
        .menu-item.out-of-stock .item-name { text-decoration: line-through; color: var(--text-muted); }
        
        .badge-out { 
            background: #94A3B8; 
            color: white; 
            padding: 2px 6px; 
            border-radius: 4px; 
            font-size: 11px; 
            margin-left: 6px; 
            font-weight: 600;
        }
        .item-name { cursor: pointer; flex: 1; font-size: 15px; font-weight: 500; padding-right: 12px; }
        .item-price { font-weight: 600; width: 70px; text-align: right; margin-right: 16px; color: var(--primary-dark);}
        
        .btn { 
            padding: 8px 16px; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-family: 'Sarabun', sans-serif; 
            font-size: 13px; 
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-add { background: #E2E8F0; color: var(--text-main); width: 80px; }
        .btn-add:hover { background: var(--primary); color: white; }
        .btn-disabled { background: #CBD5E1; color: #94A3B8; width: 80px; cursor: not-allowed; }

        /* ตะกร้าสินค้าด้านขวา */
        .cart-list { 
            margin-bottom: 16px; 
            border: 1px solid var(--border); 
            padding: 12px; 
            border-radius: 8px; 
            background: #F8FAFC;
        }
        .cart-item { display: flex; flex-direction: column; margin-bottom: 14px; font-size: 14px; border-bottom: 1px solid var(--border); padding-bottom: 12px;}
        .cart-item-main { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .cart-controls button { 
            width: 30px; 
            height: 30px; 
            cursor: pointer; 
            border: 1px solid #CBD5E1; 
            background: var(--white); 
            border-radius: 4px; 
            font-weight: 600;
            transition: background 0.2s;
        }
        .cart-controls button:hover { background: #F1F5F9; }
        
        .cart-sauce-row { background: var(--white); padding: 8px; border-radius: 6px; border: 1px dashed #CBD5E1; margin-top: 8px; font-size: 12px; display: flex; flex-direction: column; gap: 6px; }
        .cart-sauce-select { padding: 4px; border-radius: 4px; border: 1px solid #CBD5E1; font-family: 'Sarabun'; font-size: 12px; width: 100%; margin-top: 2px; color: var(--text-main);}

        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 14px; margin-bottom: 6px; font-weight: 600; color: var(--text-main);}
        .form-group input { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-family: 'Sarabun'; box-sizing: border-box; font-size: 14px;}
        
        /* ปุ่มเลือกช่องทาง */
        .delivery-btns { display: flex; gap: 6px; margin-bottom: 10px; }
        .delivery-btns button { 
            flex: 1; 
            padding: 8px 0; 
            border: 1px solid var(--border); 
            background: var(--white); 
            color: var(--text-main); 
            border-radius: 6px; 
            cursor: pointer; 
            font-family: 'Sarabun'; 
            font-weight: 600; 
            font-size: 13px;
            transition: all 0.2s;
        }
        .delivery-btns button.channel-line.active { background: #2ECC71; color: white; border-color: #2ECC71; }
        .delivery-btns button.channel-fb.active { background: #1877F2; color: white; border-color: #1877F2; }
        .delivery-btns button.channel-shop.active { background: #7F8C8D; color: white; border-color: #7F8C8D; }
        
        .delivery-btns button.del-btn.active { background: var(--text-main); color: white; border-color: var(--text-main); }
        
        /* สรุปยอดเงิน */
        .totals { border-top: 2px dashed var(--border); padding-top: 14px; margin-bottom: 4px; }
        .total-row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 14px; color: var(--text-muted);}
        .total-row.grand { font-size: 22px; font-weight: 700; color: var(--primary-dark); margin-top: 10px;}
        
        /* ปุ่มออกใบเสร็จแบบคงที่ */
        .btn-print { 
            width: 100%; 
            padding: 14px; 
            background: var(--success-dark); 
            color: white; 
            font-size: 16px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 700; 
            font-family: 'Sarabun'; 
            box-shadow: 0 4px 12px rgba(39, 174, 96, 0.2); 
            margin-top: auto; 
            transition: background 0.2s;
        }
        .btn-print:hover { background: #1E7E34; }

        /* ==========================================
           📱 RESPONSIVE CODE (ปรับแต่งหน้าจอสำหรับมือถือ)
           ========================================== */
        @media (max-width: 992px) {
            body {
                padding: 12px; /* ลดขอบหน้าจอลงเพื่อให้มีพื้นที่แสดงผลมากขึ้น */
            }
            .container {
                flex-direction: column; /* เปลี่ยนเลย์เอาท์ขวา-ซ้าย ให้เรียงต่อกันเป็น บน-ล่าง */
                gap: 16px;
            }
            .menu-section, .cart-section {
                flex: none;
                width: 100%;
                box-sizing: border-box;
                padding: 16px;
            }
            .cart-section {
                position: static; /* ยกเลิกการดึงหมุดตรึงหน้าจอ เพื่อให้เลื่อนดูตามปกติ */
                max-height: none;
                overflow: visible;
            }
            .cart-body {
                max-height: 520px; /* ล็อคความสูงของโซนกรอกบิลบนมือถือ สกรอลล์ในกล่องนี้ได้ ไม่ยาวไหลจนหาปุ่มพิมพ์บิลไม่เจอ */
                overflow-y: auto;
                padding-right: 4px;
            }
            .menu-item {
                padding: 14px 6px; /* เพิ่มพื้นที่สัมผัสปุ่มในมือถือให้จิ้มเลือกง่ายขึ้น */
            }
            .btn-add {
                padding: 10px 16px; /* ขยายขนาดปุ่มเพิ่มให้ใช้นิ้วกดง่ายขึ้น */
            }
        }

        /* ใบเสร็จสำหรับการ Capture */
        #receipt-container { position: fixed; left: -9999px; top: 0; background: white; z-index: -1; }
        #receipt { width: 212px; margin: 0; padding: 12px; font-family: 'Sarabun', sans-serif; font-size: 12px; color: black; background: white; box-sizing: border-box; }
        .r-header { text-align: center; border-bottom: 1px dashed black; padding-bottom: 6px; margin-bottom: 6px; }
        .r-title { font-size: 15px; font-weight: bold; margin: 0; }
        .r-info { margin: 2px 0; font-size: 11px; }
        .r-note-print { margin: 6px 0; font-size: 12px; font-weight: bold; color: black; border: 1px dashed black; padding: 4px; display: none; }
        .r-table { width: 100%; border-collapse: collapse; margin-bottom: 6px; font-size: 11px;}
        .r-table th { border-bottom: 1px dashed black; text-align: left; padding: 4px 0; font-size: 11px;}
        .r-table td { padding: 4px 0; vertical-align: top; line-height: 1.3;}
        .r-table .right { text-align: right; }
        .r-table .center { text-align: center; }
        .r-totals { border-top: 1px dashed black; padding-top: 6px; font-size: 11px;}
        .r-totals .flex { display: flex; justify-content: space-between; margin-bottom: 3px;}
        .r-totals .bold { font-weight: bold; font-size: 13px;}
        .r-footer { text-align: center; margin-top: 12px; font-size: 11px; font-weight: bold; border-top: 1px dashed black; padding-top: 6px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="menu-section">
            <h2>ระบบจัดการออเดอร์หน้าร้าน (POS)</h2>
            <div id="menu-container">
                <div style="text-align:center; padding:40px; color:var(--text-muted);">กำลังโหลดฐานข้อมูลสินค้า...</div>
            </div>
        </div>

        <div class="cart-section">
            <h2>รายการสั่งซื้อปัจจุบัน</h2>
            
            <div class="cart-body">
                <div class="auto-paste-box">
                    <label style="display:block; font-size:13px; font-weight:bold; color:var(--accent-blue); margin-bottom:6px;">วางข้อความคำสั่งซื้อ (Auto Paste):</label>
                    <textarea id="auto-paste-area" rows="2" placeholder="วางข้อความสรุปคำสั่งซื้อของลูกค้าที่นี่..."></textarea>
                    <button type="button" class="btn-auto-parse" onclick="parseAutoOrder()">ประมวลผลออเดอร์อัตโนมัติ</button>
                </div>

                <div class="form-group">
                    <label>ช่องทางการสั่งซื้อ:</label>
                    <div class="delivery-btns">
                        <button type="button" class="channel-line active" onclick="setChannel('LINE', this)">LINE</button>
                        <button type="button" class="channel-fb" onclick="setChannel('Facebook', this)">Facebook Inbox</button>
                        <button type="button" class="channel-shop" onclick="setChannel('หน้าร้าน', this)">หน้าร้าน</button>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>ชื่อลูกค้า / เบอร์ติดต่อ:</label>
                    <input type="text" id="customer-info" placeholder="ระบุข้อมูลลูกค้า (เช่น คุณเอ / 081-xxx-xxxx)">
                </div>
                
                <div class="form-group">
                    <label>หมายเหตุคำสั่งซื้อ:</label>
                    <input type="text" id="order-note" placeholder="ระบุเงื่อนไขพิเศษเพิ่มเติม">
                </div>

                <div class="cart-list" id="cart-list"></div>

                <div class="form-group">
                    <label>ค่าบริการจัดส่ง:</label>
                    <div class="delivery-btns">
                        <button type="button" class="del-btn active" onclick="setDelivery(0)">ฟรี / รับเอง</button>
                        <button type="button" class="del-btn" onclick="setDelivery(10)">+ 10 บาท</button>
                        <button type="button" class="del-btn" onclick="setDelivery(20)">+ 20 บาท</button>
                        <button type="button" class="del-btn" onclick="setDelivery(30)">+ 30 บาท</button>
                    </div>
                </div>

                <div class="totals">
                    <div class="total-row">
                        <span>รวมค่าสินค้า:</span>
                        <span id="subtotal">0 ฿</span>
                    </div>
                    <div class="total-row">
                        <span>ค่าจัดส่ง:</span>
                        <span id="del-fee">0 ฿</span>
                    </div>
                    <div class="total-row grand">
                        <span>ยอดสุทธิ:</span>
                        <span id="grand-total">0 ฿</span>
                    </div>
                </div>
            </div> <button class="btn-print" id="btn-download" onclick="generateReceiptImage()">ออกใบเสร็จเป็นรูปภาพ (PNG 56mm)</button>
        </div>
    </div>

    <div id="receipt-container">
        <div id="receipt">
            <div class="r-header">
                <h3 class="r-title">ปอกใส่ปาก ผลไม้พร้อมทาน</h3>
                <p class="r-info" id="r-time"></p>
                <p class="r-info" id="r-channel"></p>
                <p class="r-info" id="r-customer"></p>
                <p class="r-note-print" id="r-note"></p> 
            </div>
            <table class="r-table">
                <thead>
                    <tr>
                        <th>รายการ</th>
                        <th class="center" style="width: 30px;">จำนวน</th>
                        <th class="right" style="width: 40px;">ราคา</th>
                    </tr>
                </thead>
                <tbody id="r-items"></tbody>
            </table>
            <div class="r-totals">
                <div class="flex">
                    <span>รวมค่าสินค้า:</span>
                    <span id="r-subtotal"></span>
                </div>
                <div class="flex">
                    <span>ค่าจัดส่ง:</span>
                    <span id="r-delfee"></span>
                </div>
                <div class="flex bold">
                    <span>ยอดสุทธิ:</span>
                    <span id="r-grandtotal"></span>
                </div>
            </div>
            <div class="r-footer">
                ขอบคุณที่อุดหนุนค่ะ
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbziXKeVFE-_qwH1dEdE_AAGDvZmpZEKytWOSPjv-y3QrTVMosy2osVSwjMHs0epHdvt/exec'; 

        let menuData = [];
        let itemDictionary = {};
        let cart = {};
        let cartSauces = {}; 
        let deliveryFee = 0;
        let orderChannel = 'LINE'; 

        function setChannel(channel, btn) {
            orderChannel = channel;
            const parent = btn.parentElement;
            parent.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function checkFruitSauceEligibility(itemName) {
            if (itemName.includes('ฝรั่งแช่บ๊วย')) return false;
            return itemName.includes('มะม่วง') || itemName.includes('สับปะรด') || itemName.includes('แอปเปิ้ล') || itemName.includes('ฝรั่ง');
        }

        async function loadData() {
            try {
                const response = await fetch(SCRIPT_URL + '?action=getData');
                menuData = await response.json();
                menuData.forEach(item => { itemDictionary[item.id] = item; });
                renderMenu();
            } catch (error) {
                document.getElementById('menu-container').innerHTML = '<div style="text-align:center; padding:20px; color:var(--danger); font-weight:600;">ไม่สามารถเชื่อมต่อฐานข้อมูลได้ กรุณารีเฟรชหน้าเว็บอีกครั้ง</div>';
            }
        }

        function renderMenu() {
            const container = document.getElementById('menu-container');
            container.innerHTML = '';

            const standardCats = [...new Set(menuData.map(item => Number(item.category)))]
                .filter(cat => cat >= 40 && cat <= 100)
                .sort((a, b) => a - b);

            standardCats.forEach(cat => {
                const items = menuData.filter(item => Number(item.category) === cat);
                if (items.length > 0) {
                    createCategoryBlock(`หมวดราคากล่องละ ${cat} บาท`, items, 'standard');
                }
            });

            const premiumItems = menuData.filter(item => Number(item.category) > 100);
            if (premiumItems.length > 0) {
                createCategoryBlock(`หมวดผลไม้พรีเมียม (Premium)`, premiumItems, 'premium');
            }

            const dipItems = menuData.filter(item => Number(item.category) < 40);
            if (dipItems.length > 0) {
                createCategoryBlock(`หมวดน้ำจิ้ม / พริกเกลือเพิ่มเติม`, dipItems, 'dip');
            }
        }

        function createCategoryBlock(title, items, type) {
            const container = document.getElementById('menu-container');
            const catTitle = document.createElement('div');
            catTitle.className = `category-title cat-style-${type}`;
            catTitle.innerText = title;
            container.appendChild(catTitle);

            items.forEach(item => {
                const itemDiv = document.createElement('div');
                itemDiv.className = `menu-item ${!item.available ? 'out-of-stock' : ''}`;
                const priceLabel = `(${item.price > 0 ? item.price + '฿' : 'ฟรี'})`;
                
                itemDiv.innerHTML = `
                    <div class="item-name" ${item.available ? `onclick="addToCart('${item.id}')"` : ''}>
                        ${item.name} <span style="color:var(--primary-dark); font-size:13px; font-weight:600;">${priceLabel}</span>
                        ${!item.available ? '<span class="badge-out">สินค้าหมด</span>' : ''}
                    </div>
                    ${item.available 
                        ? `<button class="btn btn-add" onclick="addToCart('${item.id}')">+ เพิ่ม</button>`
                        : `<button class="btn btn-disabled" disabled>หมด</button>`
                    }
                `;
                container.appendChild(itemDiv);
            });
        }

        function addToCart(id) {
            if(!itemDictionary[id] || !itemDictionary[id].available) return;
            if(!cart[id]) cart[id] = 0;
            cart[id]++;

            if (checkFruitSauceEligibility(itemDictionary[id].name)) {
                if (!cartSauces[id]) cartSauces[id] = [];
                cartSauces[id].push("พริกเกลือนัวร์ (ฟรี)");
            }
            renderCart();
        }

        function updateQty(id, change) {
            if(!cart[id]) return;
            cart[id] += change;

            if (!cartSauces[id]) cartSauces[id] = [];
            if (change > 0) {
                cartSauces[id].push("พริกเกลือนัวร์ (ฟรี)");
            } else if (change < 0) {
                cartSauces[id].pop();
            }

            if(cart[id] <= 0) { delete cart[id]; delete cartSauces[id]; }
            renderCart();
        }

        function changeCartSauce(itemId, index, selectEl) {
            if (!cartSauces[itemId]) cartSauces[itemId] = [];
            cartSauces[itemId][index] = selectEl.value;
        }

        function setDelivery(fee) {
            deliveryFee = fee;
            const container = document.querySelectorAll('.delivery-btns')[1]; 
            container.querySelectorAll('.del-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText.includes(fee) || (fee === 0 && btn.innerText.includes('ฟรี'))) {
                    btn.classList.add('active');
                }
            });
            renderCart();
        }

        function renderCart() {
            const list = document.getElementById('cart-list');
            list.innerHTML = '';
            let subtotal = 0;

            for (const id in cart) {
                const item = itemDictionary[id];
                const qty = cart[id];
                const totalItem = qty * item.price;
                subtotal += totalItem;

                let sauceSelectorHTML = '';
                if (checkFruitSauceEligibility(item.name) && qty > 0) {
                    sauceSelectorHTML = `<div class="cart-sauce-row">`;
                    for(let i=0; i<qty; i++) {
                        if(!cartSauces[id]) cartSauces[id] = [];
                        if(!cartSauces[id][i]) cartSauces[id][i] = "พริกเกลือนัวร์ (ฟรี)";
                        const curSauce = cartSauces[id][i];

                        sauceSelectorHTML += `
                            <div>
                                กล่องที่ ${i+1}: 
                                <select class="cart-sauce-select" onchange="changeCartSauce('${id}', ${i}, this)">
                                    <option value="ไม่รับน้ำจิ้ม" ${curSauce === 'ไม่รับน้ำจิ้ม' ? 'selected' : ''}>ไม่รับน้ำจิ้ม</option>
                                    <option value="พริกเกลือนัวร์ (ฟรี)" ${curSauce === 'พริกเกลือนัวร์ (ฟรี)' ? 'selected' : ''}>พริกเกลือนัวร์ (ฟรี)</option>
                                    <option value="พริกเกลือกะปิแห้ง (ฟรี)" ${curSauce === 'พริกเกลือกะปิแห้ง (ฟรี)' ? 'selected' : ''}>พริกเกลือกะปิแห้ง (ฟรี)</option>
                                    <option value="พริกเกลือลาวแซ่บ (ฟรี)" ${curSauce === 'พริกเกลือลาวแซ่บ (ฟรี)' ? 'selected' : ''}>พริกเกลือลาวแซ่บ (ฟรี)</option>
                                    <option value="น้ำจิ้มบ๊วยเค็ม (ฟรี)" ${curSauce === 'น้ำจิ้มบ๊วยเค็ม (ฟรี)' ? 'selected' : ''}>น้ำจิ้มบ๊วยเค็ม (ฟรี)</option>
                                    <option value="กะปิปลาร้า (+20฿)" ${curSauce === 'กะปิปลาร้า (+20฿)' ? 'selected' : ''}>กะปิปลาร้า (+20฿)</option>
                                    <option value="กะปิหวาน (+20฿)" ${curSauce === 'กะปิหวาน (+20฿)' ? 'selected' : ''}>กะปิหวาน (+20฿)</option>
                                </select>
                            </div>
                        `;
                    }
                    sauceSelectorHTML += `</div>`;
                }

                const row = document.createElement('div');
                row.className = 'cart-item';
                row.innerHTML = `
                    <div class="cart-item-main">
                        <div style="flex:1; line-height: 1.4;">
                            <span style="font-weight:500;">${item.name}</span><br>
                            <small style="color:var(--primary-dark); font-weight:600;">${item.price > 0 ? item.price + '฿' : 'ฟรี'}</small>
                        </div>
                        <div class="cart-controls" style="display:flex; align-items:center;">
                            <button onclick="updateQty('${id}', -1)">-</button>
                            <span style="margin:0 12px; font-weight:700; width:14px; text-align:center;">${qty}</span>
                            <button onclick="updateQty('${id}', 1)">+</button>
                        </div>
                        <div style="width: 60px; text-align:right; font-weight:700;">${totalItem} ฿</div>
                    </div>
                    ${sauceSelectorHTML}
                `;
                list.appendChild(row);
            }

            if(Object.keys(cart).length === 0) {
                list.innerHTML = '<div style="color:var(--text-muted); text-align:center; padding-top:40px; font-size:14px;">ยังไม่มีสินค้าในออเดอร์<br>คลิกเลือกรายการจากแถบสินค้าด้านซ้าย</div>';
            }

            document.getElementById('subtotal').innerText = subtotal + ' ฿';
            document.getElementById('del-fee').innerText = deliveryFee + ' ฿';
            document.getElementById('grand-total').innerText = (subtotal + deliveryFee) + ' ฿';
        }

        function parseAutoOrder() {
            const text = document.getElementById('auto-paste-area').value;
            if (!text.trim()) { alert('กรุณาวางข้อความสั่งซื้อก่อนทำรายการครับ'); return; }
            
            cart = {}; cartSauces = {};
            const lines = text.split('\n');
            let custName = ''; let custPhone = ''; let custNote = '';
            
            lines.forEach(line => {
                line = line.trim();
                if (line.includes('ชื่อลูกค้า:')) { custName = line.split('ชื่อลูกค้า:')[1].trim(); }
                else if (line.includes('เบอร์โทร:')) { custPhone = line.split('เบอร์โทร:')[1].trim(); }
                else if (line.includes('หมายเหตุ:')) { custNote = line.split('หมายเหตุ:')[1].trim(); }
                else if (line.startsWith('-')) {
                    const parts = line.split(/\s+x\s+/);
                    if (parts.length >= 2) {
                        const leftPart = parts[0].replace(/^-\s*/, '').trim(); 
                        const rightPart = parts[1].trim(); 
                        
                        let matchedId = null;
                        for (const id in itemDictionary) {
                            if (leftPart.includes(itemDictionary[id].name)) { matchedId = id; break; }
                        }
                        
                        if (matchedId) {
                            const qtyMatch = rightPart.match(/^(\d+)/);
                            if (qtyMatch) {
                                const qty = parseInt(qtyMatch[1]);
                                cart[matchedId] = qty;
                                
                                const sauceMatch = rightPart.match(/\((.*)\)/);
                                if (sauceMatch && checkFruitSauceEligibility(itemDictionary[matchedId].name)) {
                                    const sauces = sauceMatch[1].split(/,\s+/);
                                    cartSauces[matchedId] = [];
                                    for(let i=0; i<qty; i++) {
                                        let s = sauces[i] ? sauces[i].trim() : "พริกเกลือนัวร์ (ฟรี)";
                                        s = s.replace(/\s*\*ไม่ฟรี/, '');
                                        cartSauces[matchedId].push(s);
                                    }
                                } else if (checkFruitSauceEligibility(itemDictionary[matchedId].name)) {
                                    cartSauces[matchedId] = Array(qty).fill("พริกเกลือนัวร์ (ฟรี)");
                                }
                            }
                        }
                    }
                }
            });
            
            document.getElementById('customer-info').value = (custName + ' ' + custPhone).trim() || 'ลูกค้าทั่วไป';
            document.getElementById('order-note').value = custNote;
            renderCart();
            alert('โหลดข้อมูลออเดอร์อัตโนมัติเรียบร้อยแล้ว!');
            document.getElementById('auto-paste-area').value = ''; 
        }

        function generateReceiptImage() {
            if(Object.keys(cart).length === 0) { alert('กรุณาเพิ่มสินค้าลงตะกร้าก่อนสร้างใบเสร็จ'); return; }

            const btn = document.getElementById('btn-download');
            btn.innerText = 'กำลังประมวลผลรูปภาพ...'; btn.disabled = true;
            const now = new Date();
            const timeStr = now.toLocaleDateString('th-TH') + ' ' + now.toLocaleTimeString('th-TH').substring(0,5) + ' น.';
            
            const customer = document.getElementById('customer-info').value.trim() || 'ลูกค้าทั่วไป';
            const note = document.getElementById('order-note').value.trim();

            document.getElementById('r-time').innerText = 'เวลา : ' + timeStr;
            document.getElementById('r-channel').innerText = 'ช่องทาง : ' + orderChannel; 
            document.getElementById('r-customer').innerText = 'ลูกค้า : ' + customer;
            
            const rNote = document.getElementById('r-note');
            if(note !== "") { rNote.innerText = 'หมายเหตุ: ' + note; rNote.style.display = 'block'; } 
            else { rNote.style.display = 'none'; }

            const rItems = document.getElementById('r-items');
            rItems.innerHTML = '';
            
            let subtotal = 0;
            for (const id in cart) {
                const item = itemDictionary[id];
                const qty = cart[id];
                const total = qty * item.price;
                subtotal += total;

                let sauceLine = '';
                if (cartSauces[id] && cartSauces[id].length > 0) {
                    sauceLine = `<br><small style="color:#555; font-style:italic;">(${cartSauces[id].join(', ')})</small>`;
                }

                rItems.innerHTML += `
                    <tr>
                        <td style="padding-right: 5px; line-height:1.2;">${item.name}${sauceLine}</td>
                        <td class="center">x${qty}</td>
                        <td class="right">${total}</td>
                    </tr>
                `;
            }

            document.getElementById('r-subtotal').innerText = subtotal + ' ฿';
            document.getElementById('r-delfee').innerText = deliveryFee + ' ฿';
            document.getElementById('r-grandtotal').innerText = (subtotal + deliveryFee) + ' ฿';

            setTimeout(() => {
                const receiptElement = document.getElementById('receipt');
                html2canvas(receiptElement, { scale: 2, backgroundColor: '#ffffff', useCORS: true }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `Receipt_${Date.now()}.png`;
                    link.href = canvas.toDataURL("image/png");
                    link.click(); 
                    btn.innerText = 'ออกใบเสร็จเป็นรูปภาพ (PNG 56mm)'; btn.disabled = false;
                }).catch(err => {
                    console.error(err); alert("เกิดข้อผิดพลาดในการสร้างรูปภาพใบเสร็จ");
                    btn.innerText = 'ออกใบเสร็จเป็นรูปภาพ (PNG 56mm)'; btn.disabled = false;
                });
            }, 300);
        }

        loadData();
    </script>
</body>
